# ──────────────────────────────────────────
# DEPLOYMENT — Redis pod
# ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-demo
  template:
    metadata:
      labels:
        app: redis-demo
    spec:
      containers:
        - name: redis-demo
          image: <your-internal-registry>/redis:<tag>
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
# ──────────────────────────────────────────
# SERVICE — Redis (internal DNS: redis-service:6379)
# ──────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis-demo
  ports:
    - port: 6379
      targetPort: 6379
