{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.web.name }}
  labels:
    app: {{ .Values.web.name }}
spec:
  to:
    kind: Service
    name: {{ .Values.web.name }}
  port:
    targetPort: {{ .Values.web.port }}
  {{- if .Values.route.tls }}
  tls:
    termination: edge
  {{- end }}
{{- end }}
